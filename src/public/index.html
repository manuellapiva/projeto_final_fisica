<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - BuscFísica</title>
  <link rel="icon" type="image" href="./assets/img/logo_buscfisica.png">
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap&quot; rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@300;400;500;600;700&display=swap&quot; rel="stylesheet">
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <header>
    <div class="logo">
      <h1>BUSCFÍSICA</h1>
      <img src="./assets/img/logo_buscfisica.png" alt="logo buscfísica">
    </div>
  </header>

  <main class="main-container">
    <section class="login-section">
      <h2>LOGIN</h2>
      <p class="subtitle">
        Faça login para acessar sua conta.
      </p>
      <div id="message" class="message"></div>
      <form id="loginForm">
        <div class="form-row">
          <label for="nome">NOME COMPLETO</label>
          <input id="nome" type="text" placeholder="Seu nome completo" required />
        </div>
        <div class="form-row">
          <label for="email">E-MAIL</label>
          <input id="email" type="email" placeholder="seu@email.com" required />
        </div>
        <div class="form-row">
          <label for="password">SENHA</label>
          <input id="password" type="password" placeholder="Digite sua senha" required />
        </div>
        <div class="button-row">
          <button type="submit">
            Entrar
          </button>
        </div>
        <div class="login-link">
          <span>Ainda não possui conta?</span>
          <a href="#">Criar conta</a>
        </div>
      </form>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-logo">
      <h2>BUSCFÍSICA</h2>
    </div>

    <div class="footer-column">
      <h4>CONTATO</h4>
      <p>BUSCFISICA7@GMAIL.COM</p>
      <p>(19) 99653-1673</p>
    </div>

    <div class="footer-column">
      <h4>DESENVOLVEDORES</h4>
      <p>AYLA CRISTINA DA SILVA VILELA</p>
      <p>GABRIELLA CAMACHO STAVARENGO</p>
      <p>GUSTAVO MILLAMONTE</p>
      <p>MARIA VITÓRIA GUEDES FERREIRA</p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
